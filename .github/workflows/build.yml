name: Build distributables

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: quansheng-toolkit-windows
            binary_glob: dist/quansheng-toolkit*
          - os: macos-latest
            artifact_name: quansheng-toolkit-macos
            binary_glob: dist/quansheng-toolkit*
          # Linux users build from source — see README. The Linux
          # PyInstaller path also pulls in Qt/EGL system libs that
          # apt-get on ubuntu-latest runners has flaked on for 10+
          # minute hangs in past runs. Re-add when stabilised.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package + dev + gui extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gui]"
          # Pillow is needed by PyInstaller to auto-convert the .ico icon
          # to the platform-native format (.icns on macOS). Bundling it
          # here keeps the build self-contained without baking it into
          # the runtime dependencies.
          pip install pillow

      - name: Run tests before packaging
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/

      - name: Build with PyInstaller
        shell: bash
        run: |
          # Path separator for --add-data differs by OS: ';' on Windows,
          # ':' elsewhere.
          # --windowed: on Windows, suppresses the console-window popup.
          #   On macOS it would bundle into a .app, which combined with
          #   --onefile produces a directory-shaped artifact that
          #   uploads as multiple unrelated files. We want a single
          #   binary on macOS, so we drop the flag there.
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            sep=";"
            windowed_flag="--windowed"
          else
            sep=":"
            windowed_flag=""
          fi
          pyinstaller --onefile $windowed_flag \
            --name quansheng-toolkit \
            --icon assets/quansheng-toolkit.ico \
            --collect-submodules quansheng_toolkit \
            --add-data "firmwares${sep}firmwares" \
            --add-data "assets${sep}assets" \
            launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with: { path: dist }

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          draft: true
          generate_release_notes: true
