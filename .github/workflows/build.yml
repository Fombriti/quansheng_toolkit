name: Build distributables

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: quansheng-toolkit-windows
            binary_glob: dist/quansheng-toolkit*
          - os: macos-latest
            artifact_name: quansheng-toolkit-macos
            binary_glob: dist/quansheng-toolkit*
          - os: ubuntu-latest
            artifact_name: quansheng-toolkit-linux
            binary_glob: dist/quansheng-toolkit*

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      # PySide6 wheels on Linux dynamically link to system Qt/EGL libs
      # that aren't present on minimal ubuntu-latest runners. Without
      # these, `import PySide6.QtGui` raises ImportError(libEGL.so.1).
      - name: Install Qt/EGL system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xkb1 \
            libgl1

      - name: Install package + dev + gui extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gui]"
          # Pillow is needed by PyInstaller to auto-convert the .ico icon
          # to the platform-native format (.icns on macOS). Bundling it
          # here keeps the build self-contained without baking it into
          # the runtime dependencies.
          pip install pillow

      - name: Run tests before packaging
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/

      - name: Build with PyInstaller
        shell: bash
        run: |
          # Path separator for --add-data differs by OS: ';' on Windows,
          # ':' elsewhere. Pick it based on the runner.
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            sep=";"
          else
            sep=":"
          fi
          # The icon flag is Windows/macOS only; Linux ignores it but
          # PyInstaller still accepts it without error.
          pyinstaller --onefile --windowed \
            --name quansheng-toolkit \
            --icon assets/quansheng-toolkit.ico \
            --collect-submodules quansheng_toolkit \
            --add-data "firmwares${sep}firmwares" \
            --add-data "assets${sep}assets" \
            launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with: { path: dist }

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          draft: true
          generate_release_notes: true
